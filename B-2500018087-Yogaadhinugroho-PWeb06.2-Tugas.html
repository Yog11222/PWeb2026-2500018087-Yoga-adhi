<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Tugas 6 CSS Flexbox Layout</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
        margin: 0;
        background-color: #f4f7f6;
        color: #333;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      .header {
        background-color: #683564;
        padding: 30px;
        text-align: center;
        color: rgb(27, 24, 24);
        font-size: 24px;
      }

      .identitas {
        font-size: 14px;
        margin-top: 10px;
        color: #f3f4f5;
      }

      .row {
        display: flex;
        flex: 1;
        flex-wrap: wrap;
      }

      .column {
        flex: 1;
        padding: 20px;
        text-align: center;
        border: 1px solid #ddd;
        min-width: 100px;
        transition: 0.3s ease;
        cursor: pointer;
      }
      .column:hover {
        transform: translateY(-10px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      }
      .col1 {
        background-color: #cc82a5;
      }
      .col2 {
        background-color: #d5dbdb;
      }
      .col3 {
        background-color: #cc82a5;
      }
      .col4 {
        background-color: #d5dbdb;
      }

      .column h2 {
        color: #232b2b;
      }

      .footer {
        background-color: #683564;
        padding: 20px;
        text-align: center;
        color: rgb(0, 0, 0);
      }
      .p {
        color: #ddd;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>HEADER</h1>
      <div class="identitas">
        Yoga adhi nurgroho | NIM: 2500018087 <br />
        Informatika - Universitas Ahmad Dahlan
      </div>
    </div>
    <div class="row">
      <div class="column col1">
        <h2>KOLOM 1</h2>
        <p>Sidebar Kiri</p>
      </div>
      <div class="column col2">
        <h2>KOLOM 2</h2>
        <p>Konten Bagian Utama</p>
      </div>
      <div class="column col3">
        <h2>KOLOM 3</h2>
        <p>Konten Bagian Utama</p>
      </div>
      <div class="column col4">
        <h2>KOLOM 4</h2>
        <p>Sidebar Kanan</p>
      </div>
    </div>

    <div class="footer">
      <h3>FOOTER</h3>
      <p class="p">&copy; 2026 Pemrograman Web - Teknik Informatika UAD</p>
    </div>
  </body>
</html>
